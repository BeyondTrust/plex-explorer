openapi: "3.0.3"
info:
  title: Plex Sandbox — gRPC API Reference
  version: "1.0.0"
  description: |
    Reconstructed gRPC service definitions for Microsoft Dataverse's plugin sandbox
    infrastructure ("Plex"). Three services form the control plane: **SidecarService**
    (host-side, 22 methods), **SandboxService** (worker, 4 methods), and
    **SandboxManagerService** (gateway, 2 methods).

    Proto definitions were extracted from decompiled .NET assemblies
    (`SidecarContract.dll`, `SandboxGrpcContracts.dll`). All methods have been
    tested live on production clusters.

    gRPC methods are mapped as POST endpoints following standard transcoding conventions.

servers:
  - url: "https://sidecarIP:shimPort"
    description: "SidecarService — host-side, from container env vars"
  - url: "https://containerIP:9000"
    description: "SandboxService — worker process inside container"
  - url: "https://sbx.{region}.gateway.prod.island.powerapps.com:443"
    description: "SandboxManagerService — external gateway"

tags:
  - name: SidecarService
    description: |
      `Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService` — 22 methods.
      Runs on the host outside the container. Provides infrastructure services:
      environment config, signing keys, cluster metadata, load reporting, telemetry.
      No authentication required. Accessed via `sidecarIP:SideCarShimEndpointPort`
      environment variables over gRPC/TLS.
  - name: SandboxService
    description: |
      `CDSRunTime.Sandbox.Contract.SandboxService` — 4 methods.
      Runs inside the container as the worker's gRPC server on port 9000.
      Execute uses bidirectional streaming for the plugin callback protocol.
      Auth: `x-ms-plex-nonce` metadata header (128-bit GUID). Ping is unauthenticated.
  - name: SandboxManagerService
    description: |
      `CDSRunTime.Sandbox.Contract.SandboxManagerService` — 2 methods.
      External gateway that routes Execute requests from the platform to
      individual sandbox worker containers. Uses the same message types
      as SandboxService.

paths:
  # ---------------------------------------------------------------------------
  # SidecarService methods (21 methods)
  # ---------------------------------------------------------------------------

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/GetWorkerAssignedMetadata:
    post:
      tags: [SidecarService]
      operationId: SidecarService_GetWorkerAssignedMetadata
      summary: Retrieve metadata assigned to a worker instance
      description: |
        Unary RPC (MethodType 0). Returns worker metadata JSON, Application
        Insights instrumentation key, and throttle end-time for the given
        worker GUID. Called by the worker at startup.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/WorkerMetadataRequest"
      responses:
        "200":
          description: Successful response
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/WorkerMetadataResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/LogWorkerTelemetry:
    post:
      tags: [SidecarService]
      operationId: SidecarService_LogWorkerTelemetry
      summary: Stream telemetry data from worker to sidecar
      description: |
        Bidirectional streaming RPC (MethodType 3). Worker streams telemetry
        events (communication, operation, trace) and receives acknowledgements.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/WorkerTelemetryRequest"
      responses:
        "200":
          description: Stream of acknowledgements
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/WorkerTelemetryResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/SetNamingServiceProperty:
    post:
      tags: [SidecarService]
      operationId: SidecarService_SetNamingServiceProperty
      summary: Update worker naming service properties (e.g., mark for deletion)
      description: |
        Unary RPC (MethodType 0). Allows the worker to set properties in the
        Service Fabric naming service, such as marking itself for deletion
        or reporting termination reasons.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/NamingServiceRequest"
      responses:
        "200":
          description: Successful response
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/NamingServiceResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/ReportWorkerLoad:
    post:
      tags: [SidecarService]
      operationId: SidecarService_ReportWorkerLoad
      summary: Report current worker load to the sidecar
      description: |
        Unary RPC (MethodType 0). Worker reports its current load (active
        request count or load metric) for scaling decisions.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/WorkerLoadRequest"
      responses:
        "200":
          description: Empty acknowledgement
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/WorkerLoadResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/ProcessPortProxyRequest:
    post:
      tags: [SidecarService]
      operationId: SidecarService_ProcessPortProxyRequest
      summary: Request network port proxy creation for the worker
      description: |
        Unary RPC (MethodType 0). Worker requests the sidecar to create a
        network port proxy/forwarding rule for outbound connectivity.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/CreateProxyRequest"
      responses:
        "200":
          description: Proxy creation result
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/CreateProxyResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/ReportMetric:
    post:
      tags: [SidecarService]
      operationId: SidecarService_ReportMetric
      summary: Report a custom metric with dimensions
      description: |
        Unary RPC (MethodType 0). Worker reports a named metric with a
        numeric value and custom string-string dimension map for telemetry.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/MetricRequest"
      responses:
        "200":
          description: Empty acknowledgement
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/MetricResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/LoadExtensionPackage:
    post:
      tags: [SidecarService]
      operationId: SidecarService_LoadExtensionPackage
      summary: Load a named extension package by name and version
      description: |
        Unary RPC (MethodType 0). Worker requests the sidecar to load a
        specific extension package identified by name and version.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/ExtensionPackageRequest"
      responses:
        "200":
          description: Extension data or load failure
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/ExtensionPackageResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/LoadBackgroundExtensionPackage:
    post:
      tags: [SidecarService]
      operationId: SidecarService_LoadBackgroundExtensionPackage
      summary: Load a background extension package by name
      description: |
        Unary RPC (MethodType 0). Worker requests loading of a background
        extension package identified by name.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/BackgroundExtensionPackageRequest"
      responses:
        "200":
          description: Extension version or load failure
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/BackgroundExtensionPackageResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/LoadDataverseExtensionAssembly:
    post:
      tags: [SidecarService]
      operationId: SidecarService_LoadDataverseExtensionAssembly
      summary: Stream a Dataverse extension assembly to the worker
      description: |
        Server streaming RPC (MethodType 2). Worker provides an assembly ID
        and hash code; the sidecar streams back the assembly content in chunks
        or returns a load failure.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/LoadDataverseExtensionAssemblyRequest"
      responses:
        "200":
          description: Stream of assembly content chunks
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/DataverseExtensionAssemblyResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/LoadHostInjectionPackage:
    post:
      tags: [SidecarService]
      operationId: SidecarService_LoadHostInjectionPackage
      summary: Stream a host injection package to the worker
      description: |
        Server streaming RPC (MethodType 2). Sidecar streams host injection
        package content to the worker, or returns a load failure.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/LoadHostInjectionPackageRequest"
      responses:
        "200":
          description: Stream of package content chunks
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/HostInjectionPackageResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/GetServiceParameters:
    post:
      tags: [SidecarService]
      operationId: SidecarService_GetServiceParameters
      summary: Get service parameters (extension, background, or plugin)
      description: |
        Unary RPC (MethodType 0). Returns service configuration parameters
        in one of three variants: ExtensionServiceParameters,
        BackgroundExtensionServiceParameters, or PluginServiceParameters.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/ServiceParametersRequest"
      responses:
        "200":
          description: Service parameters
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/ServiceParametersResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/GetClusterEnvironmentSettings:
    post:
      tags: [SidecarService]
      operationId: SidecarService_GetClusterEnvironmentSettings
      summary: Get cluster environment settings (geo, region, cluster name)
      description: |
        Unary RPC (MethodType 0). Returns environment metadata including
        environment name, cluster category, geo name, cluster name, region
        short name, region name, and cluster number.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/ClusterEnvironmentRequest"
      responses:
        "200":
          description: Cluster environment settings
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/ClusterEnvironmentResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/GetCurrentInstanceCount:
    post:
      tags: [SidecarService]
      operationId: SidecarService_GetCurrentInstanceCount
      summary: Get the current number of active worker instances
      description: |
        Unary RPC (MethodType 0). Returns the current count of active
        sandbox worker instances in the cluster.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/GetCurrentInstanceCountRequest"
      responses:
        "200":
          description: Instance count
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/GetCurrentInstanceCountResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/GetAccessToken:
    post:
      tags: [SidecarService]
      operationId: SidecarService_GetAccessToken
      summary: Acquire an OAuth access token for a resource
      description: |
        Unary RPC. Takes ResourceId, TenantId, AppId, and Scope fields.
        Returns either a ResourceAccessToken or an ErrorDetails string via
        a oneof response. Currently returns "not supported" on tested clusters.
        The Scope field (field 4) triggers a different code path that attempts
        token acquisition but the backing provider is not configured.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/AccessTokenRequest"
      responses:
        "200":
          description: Access token or error
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/AccessTokenResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/GetTokenFromCustomerIdentity:
    post:
      tags: [SidecarService]
      operationId: SidecarService_GetTokenFromCustomerIdentity
      summary: Acquire a token using customer identity
      description: |
        Unary RPC. Takes repeated scope strings. Returns a token and expiration
        timestamp. Handler throws an exception on tested clusters — the
        customer identity provider is not configured.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/GetCustomerIdentityTokenRequest"
      responses:
        "200":
          description: Token and expiration
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/GetCustomerIdentityTokenResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/GetOpenIdSigningKeys:
    post:
      tags: [SidecarService]
      operationId: SidecarService_GetOpenIdSigningKeys
      summary: Retrieve OpenID Connect signing keys
      description: |
        Unary RPC (MethodType 0). Returns the OpenID signing key JSON for
        token validation purposes.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/OpenIdRequest"
      responses:
        "200":
          description: Signing key JSON
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/OpenIdResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/GetIsIGTokenValidationEnabled:
    post:
      tags: [SidecarService]
      operationId: SidecarService_GetIsIGTokenValidationEnabled
      summary: Check if IG token validation is enabled
      description: |
        Unary RPC (MethodType 0). Returns a boolean indicating whether
        Instance Gateway token validation is enabled in this cluster.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/IGTokenValidationRequest"
      responses:
        "200":
          description: Validation enabled flag
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/IGTokenValidationResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/SendCrashEvent:
    post:
      tags: [SidecarService]
      operationId: SidecarService_SendCrashEvent
      summary: Report a crash event to the sidecar
      description: |
        Unary RPC (MethodType 0). Worker reports a crash event with
        timestamp, crash type, and details. Response echoes back the
        stored CrashEventDetail.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/CrashEventDetail"
      responses:
        "200":
          description: Stored crash event detail
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/CrashEventDetail"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/GetLastCrashEvent:
    post:
      tags: [SidecarService]
      operationId: SidecarService_GetLastCrashEvent
      summary: Retrieve the most recent crash event
      description: |
        Unary RPC (MethodType 0). Returns the last recorded crash event
        detail for diagnostics. Request is an empty message.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/CrashEventRequest"
      responses:
        "200":
          description: Last crash event detail
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/CrashEventDetail"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/ReportWorkerBusy:
    post:
      tags: [SidecarService]
      operationId: SidecarService_ReportWorkerBusy
      summary: Report that the worker is busy processing a request
      description: |
        Unary RPC (MethodType 0). Worker signals it is busy. Response
        contains expiry, idle expiry, and life expiry timestamps used
        for scheduling and lifecycle management.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/WorkerBusyRequest"
      responses:
        "200":
          description: Expiry timestamps
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/WorkerBusyResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/ReportWorkerComplete:
    post:
      tags: [SidecarService]
      operationId: SidecarService_ReportWorkerComplete
      summary: Report that the worker has completed its current request
      description: |
        Unary RPC (MethodType 0). Worker signals completion. Both request
        and response are empty messages.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/WorkerCompleteRequest"
      responses:
        "200":
          description: Empty acknowledgement
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/WorkerCompleteResponse"

  /Microsoft.PowerPlatform.Plex.SidecarContract.SidecarService/GetEnvironmentVariables:
    post:
      tags: [SidecarService]
      operationId: SidecarService_GetEnvironmentVariables
      summary: Retrieve environment variables from the sidecar
      description: |
        Unary RPC (MethodType 0). Returns a map of environment variable
        names to values. May contain sensitive configuration.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/GetEnvironmentVariablesRequest"
      responses:
        "200":
          description: Environment variable map
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/GetEnvironmentVariablesResponse"

  # ---------------------------------------------------------------------------
  # SandboxService methods (4 methods)
  # ---------------------------------------------------------------------------

  /CDSRunTime.Sandbox.Contract.SandboxService/Execute:
    post:
      tags: [SandboxService]
      operationId: SandboxService_Execute
      summary: Execute a plugin in the sandbox worker (bidirectional streaming)
      description: |
        Bidirectional streaming RPC (MethodType 3). The primary plugin execution
        channel. The manager sends an initial ExecuteRequest with call info,
        assembly details, and execution context. The worker may send back
        callback requests (service bus, secret management, token acquisition,
        data operations, etc.) via ExecuteResponse, and the manager replies
        with the callback results via subsequent ExecuteRequest messages.

        The request/response use extensive oneof patterns to multiplex many
        different callback and response types over a single streaming channel.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/ExecuteRequest"
      responses:
        "200":
          description: Stream of execution results and callback requests
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/ExecuteResponse"

  /CDSRunTime.Sandbox.Contract.SandboxService/Ping:
    post:
      tags: [SandboxService]
      operationId: SandboxService_Ping
      summary: Health check the sandbox worker
      description: |
        Unary RPC (MethodType 0). Returns the worker service health status
        (HEALTHY, UNHEALTHY, or UNKNOWN).
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/PingRequest"
      responses:
        "200":
          description: Service health status
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/PingResponse"

  /CDSRunTime.Sandbox.Contract.SandboxService/ShutdownService:
    post:
      tags: [SandboxService]
      operationId: SandboxService_ShutdownService
      summary: Request graceful shutdown of the sandbox worker
      description: |
        Unary RPC (MethodType 0). Instructs the worker to shut down
        gracefully. Returns success status and optional error details.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/ShutdownServiceRequest"
      responses:
        "200":
          description: Shutdown result
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/ShutdownServiceRespone"

  /CDSRunTime.Sandbox.Contract.SandboxService/ValidateCodeSign:
    post:
      tags: [SandboxService]
      operationId: SandboxService_ValidateCodeSign
      summary: Validate code signing of a component
      description: |
        Unary RPC (MethodType 0). Validates the code signature of a
        component identified by name, version, and type. Component content
        is sent as repeated byte chunks.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/ComponentSignRequest"
      responses:
        "200":
          description: Signing validation result
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/ComponentSignResponse"

  # ---------------------------------------------------------------------------
  # SandboxManagerService methods (2 methods)
  # ---------------------------------------------------------------------------

  /CDSRunTime.Sandbox.Contract.SandboxManagerService/Execute:
    post:
      tags: [SandboxManagerService]
      operationId: SandboxManagerService_Execute
      summary: Execute a plugin via the sandbox manager (bidirectional streaming)
      description: |
        Bidirectional streaming RPC (MethodType 3). Front-door entry point
        that proxies Execute calls to individual sandbox worker containers.
        Uses the same ExecuteRequest/ExecuteResponse message types as
        SandboxService.Execute.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/ExecuteRequest"
      responses:
        "200":
          description: Stream of execution results and callback requests
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/ExecuteResponse"

  /CDSRunTime.Sandbox.Contract.SandboxManagerService/Ping:
    post:
      tags: [SandboxManagerService]
      operationId: SandboxManagerService_Ping
      summary: Health check the sandbox manager
      description: |
        Unary RPC (MethodType 0). Returns the manager service health status.
      requestBody:
        required: true
        content:
          application/grpc+proto:
            schema:
              $ref: "#/components/schemas/PingRequest"
      responses:
        "200":
          description: Service health status
          content:
            application/grpc+proto:
              schema:
                $ref: "#/components/schemas/PingResponse"

components:
  schemas:
    # =========================================================================
    # SidecarService message types
    # =========================================================================

    WorkerMetadataRequest:
      type: object
      description: "Request to get worker-assigned metadata"
      properties:
        workerGuid:
          type: string
          description: "Field 1: GUID identifying the worker instance"

    WorkerMetadataResponse:
      type: object
      description: "Worker metadata including telemetry keys and throttle info"
      properties:
        workerMetadata:
          type: string
          description: "Field 1: JSON blob of worker metadata"
        applicationInsightsKey:
          type: string
          description: "Field 2: Application Insights instrumentation key"
        workerThrottleEndtime:
          type: string
          format: date-time
          description: "Field 3: google.protobuf.Timestamp - throttle end time"

    WorkerTelemetryRequest:
      type: object
      description: "Telemetry event from worker (bidirectional streaming)"
      properties:
        telemetryRequestType:
          type: object
          description: "oneof telemetry_request_type"
          properties:
            communicationRequest:
              type: object
              description: "Field 1: Communication telemetry request"
            operationRequest:
              type: object
              description: "Field 2: Operation telemetry request"
            traceRequest:
              type: object
              description: "Field 3: Trace telemetry request"

    WorkerTelemetryResponse:
      type: object
      description: "Acknowledgement for telemetry stream (empty message)"

    NamingServiceRequest:
      type: object
      description: "Request to set a naming service property"
      properties:
        propertyName:
          type: string
          enum: [mark_worker_deletion]
          description: "Field 1: enum WorkerPropertyName"
        propertValue:
          type: string
          enum: ["true"]
          description: "Field 2: enum WorkerPropertyValue"
        workerTerminationReason:
          type: string
          enum: [Idle, MaxLifetime]
          description: "Field 3: enum WorkerTerminationReason"

    NamingServiceResponse:
      type: object
      description: "Result of naming service property update"
      properties:
        success:
          type: boolean
          description: "Field 1: Whether the operation succeeded"
        errorDetails:
          type: string
          description: "Field 2: Error details if the operation failed"

    WorkerLoadRequest:
      type: object
      description: "Worker load report"
      properties:
        loadType:
          type: object
          description: "oneof load_type"
          properties:
            activeWorkerRequestCount:
              type: integer
              format: int32
              description: "Field 1: Number of active requests"
            activeWorkerLoad:
              type: integer
              format: int32
              description: "Field 2: Numeric load metric"

    WorkerLoadResponse:
      type: object
      description: "Empty acknowledgement for load report"

    CreateProxyRequest:
      type: object
      description: "Request to create a network port proxy"
      properties:
        workerIp:
          type: string
          description: "Field 1: IP address of the worker requesting the proxy"

    CreateProxyResponse:
      type: object
      description: "Result of port proxy creation"
      properties:
        status:
          type: string
          enum: [success, failed]
          description: "Field 1: enum ProxyServiceRequestStatus"

    MetricRequest:
      type: object
      description: "Custom metric report"
      properties:
        metricName:
          type: string
          description: "Field 1: Name of the metric"
        value:
          type: integer
          format: int64
          description: "Field 2: Metric value"
        customDimensions:
          type: object
          additionalProperties:
            type: string
          description: "Field 3: map<string, string> of custom dimensions"

    MetricResponse:
      type: object
      description: "Empty acknowledgement for metric report"

    ExtensionPackageRequest:
      type: object
      description: "Request to load an extension package"
      properties:
        extensionName:
          type: string
          description: "Field 1: Name of the extension"
        extensionVersion:
          type: string
          description: "Field 2: Version of the extension"

    ExtensionPackageResponse:
      type: object
      description: "Extension package load result"
      properties:
        responseData:
          type: object
          description: "oneof response_data"
          properties:
            extensionSuccess:
              type: object
              description: "Field 1: Successful extension load (ExtensionServiceParameters)"
            extensionLoadFailure:
              type: string
              enum: [name_not_available, storage_access_error]
              description: "Field 2: enum ExtensionLoadFailure"

    BackgroundExtensionPackageRequest:
      type: object
      description: "Request to load a background extension package"
      properties:
        backgroundExtensionName:
          type: string
